# tmux copy-mode 複製時送到系統剪貼簿
set -g set-clipboard on

# 加大 scrollback history
set -g history-limit 100000


# tmux copy mode 不要在copy 後主動離開 
set -g @copy_mode_exit 0
bind-key -T copy-mode M-w send-keys -X copy-selection-no-clear



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'fcsonline/tmux-thumbs'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


###########################
# thumns config           #
###########################

# Linux ( wl-copy)
# copy tmux buffer to wl-copy buffer (system buffer of copy paste)
#(debian) sudo apt install wl-clipboard
set -g @thumbs-command 'echo -n {} | wl-copy && tmux set-buffer -- {}'





run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

